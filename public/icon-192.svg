<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Subtle border glow -->
  <rect x="1" y="1" width="190" height="190" rx="41" fill="none" stroke="#d4a853" stroke-opacity="0.15" stroke-width="1.5"/>
  <!-- Tower building -->
  <g transform="translate(96, 96)" fill="url(#gold)">
    <!-- Main tower -->
    <rect x="-16" y="-52" width="32" height="72" rx="2"/>
    <!-- Tower top/spire -->
    <polygon points="-12,-52 12,-52 8,-64 -8,-64"/>
    <rect x="-2" y="-72" width="4" height="10" rx="1"/>
    <!-- Windows on tower -->
    <rect x="-10" y="-46" width="6" height="5" rx="1" fill="#0f172a" opacity="0.5"/>
    <rect x="4" y="-46" width="6" height="5" rx="1" fill="#0f172a" opacity="0.5"/>
    <rect x="-10" y="-36" width="6" height="5" rx="1" fill="#0f172a" opacity="0.5"/>
    <rect x="4" y="-36" width="6" height="5" rx="1" fill="#0f172a" opacity="0.5"/>
    <rect x="-10" y="-26" width="6" height="5" rx="1" fill="#0f172a" opacity="0.5"/>
    <rect x="4" y="-26" width="6" height="5" rx="1" fill="#0f172a" opacity="0.5"/>
    <rect x="-10" y="-16" width="6" height="5" rx="1" fill="#0f172a" opacity="0.5"/>
    <rect x="4" y="-16" width="6" height="5" rx="1" fill="#0f172a" opacity="0.5"/>
    <!-- Left wing -->
    <rect x="-36" y="-32" width="18" height="52" rx="2"/>
    <rect x="-32" y="-26" width="4" height="4" rx="0.5" fill="#0f172a" opacity="0.5"/>
    <rect x="-24" y="-26" width="4" height="4" rx="0.5" fill="#0f172a" opacity="0.5"/>
    <rect x="-32" y="-18" width="4" height="4" rx="0.5" fill="#0f172a" opacity="0.5"/>
    <rect x="-24" y="-18" width="4" height="4" rx="0.5" fill="#0f172a" opacity="0.5"/>
    <rect x="-32" y="-10" width="4" height="4" rx="0.5" fill="#0f172a" opacity="0.5"/>
    <rect x="-24" y="-10" width="4" height="4" rx="0.5" fill="#0f172a" opacity="0.5"/>
    <!-- Right wing -->
    <rect x="18" y="-32" width="18" height="52" rx="2"/>
    <rect x="22" y="-26" width="4" height="4" rx="0.5" fill="#0f172a" opacity="0.5"/>
    <rect x="30" y="-26" width="4" height="4" rx="0.5" fill="#0f172a" opacity="0.5"/>
    <rect x="22" y="-18" width="4" height="4" rx="0.5" fill="#0f172a" opacity="0.5"/>
    <rect x="30" y="-18" width="4" height="4" rx="0.5" fill="#0f172a" opacity="0.5"/>
    <rect x="22" y="-10" width="4" height="4" rx="0.5" fill="#0f172a" opacity="0.5"/>
    <rect x="30" y="-10" width="4" height="4" rx="0.5" fill="#0f172a" opacity="0.5"/>
    <!-- Ground/base line -->
    <rect x="-42" y="20" width="84" height="2" rx="1" opacity="0.4"/>
  </g>
  <!-- Text -->
  <text x="96" y="164" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" letter-spacing="3" fill="#d4a853">RIHAN</text>
  <text x="96" y="182" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" letter-spacing="2" fill="#94a3b8">HEIGHTS B701</text>
</svg>
